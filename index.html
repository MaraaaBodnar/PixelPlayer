<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Піксельна Музична Шкатулка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .music-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        canvas {
            border: 2px solid #333;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background: #fff;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #667eea;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button.reset-btn {
            background: #ff6b6b;
        }

        button.play-btn {
            background: #51cf66;
        }

        button.stop-btn {
            background: #ff8787;
        }

        .bpm-control {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 25px;
        }

        .bpm-control label {
            font-weight: bold;
            color: #333;
        }

        .bpm-control input {
            width: 80px;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .bpm-control span {
            font-weight: bold;
            color: #667eea;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            background: #e9ecef;
            font-weight: bold;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .playing {
            animation: pulse 0.5s ease-in-out;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            button {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Піксельна Музична Шкатулка 🎵</h1>
        <div class="subtitle">Клацайте на пікселі, щоб створити музику!</div>

        <div class="music-box">
            <canvas id="musicCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="play-btn" onclick="playMusic()">▶ Грати</button>
            <button class="stop-btn" onclick="stopMusic()">⏹ Стоп</button>
            <button class="reset-btn" onclick="clearPixels()">🗑 Очистити</button>
            <div class="bpm-control">
                <label>Tempo (BPM):</label>
                <input type="number" id="bpmInput" min="40" max="240" value="120">
                <span>ударів/хв</span>
                <button onclick="updateBPM()">Встановити</button>
            </div>
        </div>

        <div class="legend" id="legend">
            <!-- Легенда буде заповнена через JavaScript -->
        </div>

        <div class="status" id="status">
            Готово до роботи. Натисніть "Грати" щоб почати!
        </div>
    </div>

    <script>
        let canvas = document.getElementById('musicCanvas');
        let ctx = canvas.getContext('2d');
        let pixelSize = 50;
        let width = 16;
        let height = 8;
        let pixels = [];
        let notes = {};
        let currentPlayback = null;
        let isPlaying = false;
        let currentColumn = 0;

        // аудіо контекст
        let audioCtx = null;

        // ініціалізація аудіо контексту
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        // відтворення ноти
        function playNote(frequency, duration, color) {
            if (!audioCtx) return;

            const now = audioCtx.currentTime;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);

            oscillator.start(now);
            oscillator.stop(now + duration);

            // візуальний ефект
            const status = document.getElementById('status');
            status.innerHTML = `🎵 Грає нота: ${getNoteNameByFrequency(frequency)} 🎵`;
            status.style.backgroundColor = color;
            setTimeout(() => {
                if (!isPlaying) {
                    status.style.backgroundColor = '#e9ecef';
                    status.innerHTML = 'Готово до роботи. Натисніть "Грати" щоб почати!';
                }
            }, duration * 1000);
        }

        function getNoteNameByFrequency(freq) {
            for (let i in notes) {
                if (Math.abs(notes[i].freq - freq) < 0.01) {
                    return notes[i].note;
                }
            }
            return 'Невідома нота';
        }

        // отримання стану від сервера
        async function loadState() {
            try {
                const response = await fetch('/api/state');
                const data = await response.json();
                pixels = data.pixels;
                width = data.width;
                height = data.height;
                notes = data.notes;
                drawCanvas();
                updateLegend();
            } catch (error) {
                console.error('Помилка завантаження:', error);
            }
        }

        // оновлення легенди
        function updateLegend() {
            const legendDiv = document.getElementById('legend');
            legendDiv.innerHTML = '';

            for (let i = 0; i < height; i++) {
                if (notes[i]) {
                    const legendItem = document.createElement('div');
                    legendItem.className = 'legend-item';

                    const colorDiv = document.createElement('div');
                    colorDiv.className = 'legend-color';
                    colorDiv.style.backgroundColor = notes[i].color;

                    const textSpan = document.createElement('span');
                    textSpan.textContent = notes[i].note;

                    legendItem.appendChild(colorDiv);
                    legendItem.appendChild(textSpan);
                    legendDiv.appendChild(legendItem);
                }
            }
        }

        // Малювання канвасу
        function drawCanvas() {
            canvas.width = width * pixelSize;
            canvas.height = height * pixelSize;

            for (let row = 0; row < height; row++) {
                for (let col = 0; col < width; col++) {
                    const x = col * pixelSize;
                    const y = row * pixelSize;

                    if (pixels[row] && pixels[row][col] === 1) {
                        ctx.fillStyle = notes[row] ? notes[row].color : '#cccccc';
                        ctx.fillRect(x, y, pixelSize - 1, pixelSize - 1);
                    } else {
                        ctx.fillStyle = '#f0f0f0';
                        ctx.fillRect(x, y, pixelSize - 1, pixelSize - 1);
                    }

                    ctx.strokeStyle = '#ddd';
                    ctx.strokeRect(x, y, pixelSize - 1, pixelSize - 1);

                    // Підпис нот
                    if (col === 0 && notes[row]) {
                        ctx.font = '12px Arial';
                        ctx.fillStyle = '#666';
                        ctx.fillText(notes[row].note, x + 5, y + 20);
                    }
                }
            }

            // Підсвічування поточної колонки при програванні
            if (isPlaying) {
                ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                ctx.fillRect(currentColumn * pixelSize, 0, pixelSize, canvas.height);
            }
        }

        // Обробка кліку на канвасі
        canvas.addEventListener('click', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            const col = Math.floor(mouseX / pixelSize);
            const row = Math.floor(mouseY / pixelSize);

            if (row >= 0 && row < height && col >= 0 && col < width) {
                try {
                    const response = await fetch('/api/toggle', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({row: row, col: col})
                    });
                    const data = await response.json();
                    pixels = data.pixels;
                    drawCanvas();
                } catch (error) {
                    console.error('Помилка перемикання пікселя:', error);
                }
            }
        });

        // Очищення всіх пікселів
        async function clearPixels() {
            try {
                const response = await fetch('/api/clear', {
                    method: 'POST'
                });
                const data = await response.json();
                pixels = data.pixels;
                drawCanvas();
                document.getElementById('status').innerHTML = 'Всі пікселі очищено!';
                setTimeout(() => {
                    if (!isPlaying) {
                        document.getElementById('status').innerHTML = 'Готово до роботи. Натисніть "Грати" щоб почати!';
                    }
                }, 2000);
            } catch (error) {
                console.error('Помилка очищення:', error);
            }
        }

        // Оновлення BPM
        async function updateBPM() {
            const bpm = document.getElementById('bpmInput').value;
            try {
                const response = await fetch('/api/set_bpm', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({bpm: parseInt(bpm)})
                });
                const data = await response.json();
                document.getElementById('status').innerHTML = `Tempo встановлено: ${data.bpm} BPM`;
                setTimeout(() => {
                    if (!isPlaying) {
                        document.getElementById('status').innerHTML = 'Готово до роботи. Натисніть "Грати" щоб почати!';
                    }
                }, 2000);
            } catch (error) {
                console.error('Помилка оновлення BPM:', error);
            }
        }

        // Отримання послідовності для програвання
        async function getSequence() {
            try {
                const response = await fetch('/api/sequence');
                const data = await response.json();
                return data.sequence;
            } catch (error) {
                console.error('Помилка отримання послідовності:', error);
                return [];
            }
        }

        // Програвання музики
        async function playMusic() {
            if (isPlaying) {
                stopMusic();
            }

            const bpm = document.getElementById('bpmInput').value;
            const beatDuration = 60 / parseInt(bpm);

            const sequence = await getSequence();
            if (sequence.length === 0) {
                document.getElementById('status').innerHTML = 'Немає нот для програвання!';
                return;
            }

            isPlaying = true;
            currentColumn = 0;

            // Ініціалізуємо аудіо контекст при першому відтворенні
            initAudio();

            function playColumn() {
                if (!isPlaying) return;

                if (sequence[currentColumn] && sequence[currentColumn].length > 0) {
                    const notesAtColumn = sequence[currentColumn];

                    // Відтворюємо всі ноти в поточній колонці
                    for (let note of notesAtColumn) {
                        playNote(note.freq, beatDuration * 0.8, note.color);
                    }
                }

                // Оновлюємо візуалізацію
                drawCanvas();

                // Переходимо до наступної колонки
                currentColumn = (currentColumn + 1) % sequence.length;

                // Плануємо наступне відтворення
                currentPlayback = setTimeout(playColumn, beatDuration * 1000);
            }

            playColumn();
            document.getElementById('status').innerHTML = '🎵 Музика грає... 🎵';
        }

        function stopMusic() {
            isPlaying = false;
            if (currentPlayback) {
                clearTimeout(currentPlayback);
                currentPlayback = null;
            }
            currentColumn = 0;
            drawCanvas();
            document.getElementById('status').innerHTML = 'Музику зупинено';
            setTimeout(() => {
                document.getElementById('status').innerHTML = 'Готово до роботи. Натисніть "Грати" щоб почати!';
            }, 2000);
        }

        // Ініціалізація
        loadState();

        // Оновлення BPM при зміні значення
        document.getElementById('bpmInput').addEventListener('change', updateBPM);
    </script>
</body>
</html>
